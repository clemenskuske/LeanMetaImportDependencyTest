$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://lean-meta-library.local/schemas/manifest.config.yaml"
title: "Lean Meta Library manifest"
description: >
  Schema for Lean Meta Library manifest.yaml files. Fields marked as created
  fields are populated by tooling/workflows rather than supplied by the initial
  author.
$comment: >
  Each present Lake package has its own lean-toolchain file at its package root.
  lml-env.json pins the Lean version and the Mathlib base import; package
  toolchain files are checked against that fixed Lean version.
type: object
additionalProperties: false

required:
  - leanVersion
  - mathlibVersion
  - AbstractPath
  - SubmissionName
  - SubmissionSlug
  - BibEntries
  - LicenseFile

properties:
  manifestVersion:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    description: >
      Version of the manifest format. Currently "1".

  leanVersion:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    description: >
      The Lean version used by the submission packages. Must match the version
      pinned in lml-env.json.

  mathlibVersion:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    description: >
      The Mathlib revision used by the submission packages. Must match the
      revision pinned in lml-env.json.

  LicenseFile:
    $ref: "#/$defs/repoRelativePath"
    description: >
      Repository-relative path to the license file for this submission.

  StatementSubmissions:
    type: object
    description: >
      The submission's statement package: its root folder and the statement
      entries it publishes.
    additionalProperties: false
    required:
      - rootFolder
      - statements
    properties:
      rootFolder:
        $ref: "#/$defs/repoRelativePath"
        description: >
          Repository-relative path to the folder containing the statement
          package. The folder must contain a lakefile.lean and a lean-toolchain
          file.
      statements:
        type: array
        minItems: 1
        description: >
          Entries that publish the submission's public definitions and axiom
          statements. Each entry names the public declaration, records whether it
          is a definition or axiom, points to the Lean declaration, and lists the
          semantic dependencies used by that declaration.
        items:
          $ref: "#/$defs/statementEntry"

  ProofSubmissions:
    type: object
    description: >
      The submission's proof package: its root folder and the proof entries it
      records.
    additionalProperties: false
    required:
      - rootFolder
      - proofs
    properties:
      rootFolder:
        $ref: "#/$defs/repoRelativePath"
        description: >
          Repository-relative path to the folder containing the proof package.
          The folder must contain a lakefile.lean and a lean-toolchain file.
      proofs:
        type: array
        description: >
          Entries that record proofs for statement axioms. Each entry names the
          proof declaration and the axiom it discharges. The target axiom may
          belong to this submission or to another submission.
        items:
          $ref: "#/$defs/proofEntry"

  AbstractPath:
    allOf:
      - $ref: "#/$defs/repoRelativePath"
    type: string
    pattern: "\\.tex$"
    description: >
      Repository-relative path to abstract.tex. The abstract is a short
      summary of the submission's results.

  SubmissionName:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    description: "Human-readable submission name."

  SubmissionSlug:
    $ref: "#/$defs/submissionSlug"
    description: "Machine-facing slug for this submission. Lean package names are derived from this value."

  BibEntries:
    type: array
    description: >
      BibTeX references for papers whose results are fully or partly formalized
      in this submission.
    items:
      $ref: "#/$defs/safeText"

  submissionIssueNumber:
    type: integer
    minimum: 1
    description: >
      Created automatically by the submit workflow. GitHub issue number for the
      issue used to manage this submission.

  submissionIssueUrl:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    format: uri
    description: >
      Created automatically by the submit workflow. URL of the GitHub issue used
      to manage this submission.

  Repo:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    format: uri
    minLength: 1
    description: "Created automatically by tooling/workflows. Full repository URL."

  Commit:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    pattern: "^[0-9a-f]{40}$"
    description: "Created automatically by tooling/workflows. Full SHA-1 commit hash of the source repository."

  submittedBy:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    description: "Created automatically by the submit workflow. User who initiated the submission."

$defs:
  safeText:
    type: string
    pattern: "^[\\t\\r\\n\\x20-\\x7E]*$"
    not:
      anyOf:
        - pattern: "`"
        - pattern: "\\$\\("
        - pattern: "\\$\\{"
        - pattern: ";"
        - pattern: "&&"
        - pattern: "\\|\\|"
        - pattern: "[<>]"
    description: >
      Plain ASCII text accepted by the manifest checkers. Rejects suspicious
      shell tokens such as backticks, command substitutions, shell separators,
      and angle brackets.

  displayText:
    type: string
    pattern: "^[^\\x00-\\x08\\x0B\\x0C\\x0E-\\x1F\\x7F]*$"
    not:
      anyOf:
        - pattern: "`"
        - pattern: "\\$\\("
        - pattern: "\\$\\{"
    description: >
      Inline display text accepted for TeX and Lean snippets. Allows printable
      Unicode and mathematical notation while rejecting control characters and
      command-substitution tokens.

  repoRelativePath:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    pattern: "^(?!/)(?!.*(?:^|/)\\.\\.(?:/|$)).+$"
    description: "Relative path that must stay inside the repository root."

  submissionScopedName:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    pattern: "^[A-Z][A-Za-z0-9_']*\\.(Statements|Proofs)\\.[A-Za-z_][A-Za-z0-9_']*(\\.[A-Za-z_][A-Za-z0-9_']*)*$"
    description: >
      A global Lean declaration name scoped to a submission. It must start with
      a submission slug in PascalCase, followed by either ".Statements." or
      ".Proofs.", followed by the remaining namespace and declaration name, for
      example MySlug.Statements.MyNamespace.my_decl or
      MySlug.Proofs.MyNamespace.my_theorem.

  submissionSlug:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    pattern: "^[A-Za-z][A-Za-z0-9-]*$"

  statementEntry:
    type: object
    description: >
      Statement entry. Required fields are Name and Type.
    additionalProperties: false
    required:
      - Name
      - Type
    properties:
      Name:
        $ref: "#/$defs/submissionScopedName"
        description: "Fully-qualified declaration name for this public statement."
      Type:
        type: string
        enum:
          - Definition
          - Axiom
        description: "Statement entry kind."
      Title:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: "Optional human-readable title for display."
      InlineTexReference:
        allOf:
          - $ref: "#/$defs/displayText"
        type: string
        description: "Optional inline TeX reference for the statement, for display."
      InlineLeanStatement:
        allOf:
          - $ref: "#/$defs/displayText"
        type: string
        description: "Optional inline Lean statement for the statement, for display."
      SemanticDependencies:
        type: array
        description: "Semantic dependencies of this statement, as a list of fully-qualified declaration names."
        items:
          $ref: "#/$defs/submissionScopedName"

  proofEntry:
    type: object
    description: >
      Proof entry. Required fields are Name and AxiomReference. Both are global
      Lean declaration names: the leading namespace segment is the submission
      slug in PascalCase, so each name identifies a declaration uniquely across
      all submissions.
    additionalProperties: false
    required:
      - Name
      - AxiomReference
    properties:
      Name:
        $ref: "#/$defs/submissionScopedName"
        description: >
          Global name of the proof declaration in this submission's proof
          package, for example SubmissionSlug.Proofs.Namespace.theorem.
      AxiomReference:
        $ref: "#/$defs/submissionScopedName"
        description: >
          Global name of the statement axiom this proof discharges. It may
          belong to this submission or to another submission; either way the
          leading namespace segment is that submission's slug in PascalCase.
      Title:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: "Optional human-readable title for display."
      InlineTexReference:
        allOf:
          - $ref: "#/$defs/displayText"
        type: string
        description: "Optional inline TeX reference for the proof, for display."
      InlineLeanStatement:
        allOf:
          - $ref: "#/$defs/displayText"
        type: string
        description: "Optional inline Lean statement for the proof, for display."
      ProofObligations:
        type: array
        description: "Dependencies of this proof expressed as proof obligations, each a fully-qualified declaration name."
        items:
          $ref: "#/$defs/submissionScopedName"
